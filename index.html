<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UT - Date & Serial Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary-orange: #ff6600;
      --dark-orange: #e65c00;
    }

    body { background-color: #f8f9fa; font-family: sans-serif; }
    
    .header { 
      background: var(--primary-orange); 
      color: white; 
      padding: 15px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    }

    .main-card { 
      background: white; border-radius: 12px; padding: 25px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      max-width: 480px; margin: 25px auto; 
    }

    /* Tab Styling - ပြင်ဆင်ထားသော ပုံစံသစ် */
    .nav-pills .nav-link { 
      color: #666; 
      font-weight: bold; 
      background-color: #eee; /* မရွေးထားချိန်တွင် မီးခိုးရောင်ဖျော့ */
      border: 1px solid #ddd; 
      margin: 0 5px; 
      transition: 0.3s ease;
    }

    /* Tab ကို ရွေးလိုက်တဲ့အခါ (Active ဖြစ်တဲ့အခါ) */
    .nav-pills .nav-link.active { 
      background-color: var(--primary-orange) !important; /* လိမ္မော်ရောင်ပြောင်းရန် */
      color: white !important; /* စာသားအဖြူရောင်ပြောင်းရန် */
      border-color: var(--primary-orange);
      box-shadow: 0 4px 10px rgba(255, 102, 0, 0.2); /* အောက်က အရိပ်လေးထည့်ပေးထားပါတယ် */
    }

    /* Mouse တင်လိုက်တဲ့အခါ (Hover) */
    .nav-pills .nav-link:hover:not(.active) {
      background-color: #e2e2e2;
      color: var(--primary-orange);
    }

    .form-control-lg { border: 2px solid #eee; border-radius: 8px; font-weight: bold; }
    .form-control-lg:focus { border-color: var(--primary-orange); box-shadow: none; }

    .btn-convert { 
      background-color: var(--primary-orange); color: white; font-weight: bold; 
      padding: 12px; border: none; width: 100%; border-radius: 8px; margin-top: 10px;
      transition: 0.2s;
    }

    .btn-convert:hover { background-color: var(--dark-orange); transform: scale(1.01); }

    .result-box {
      background-color: #fff9f5; border: 1px solid #ffd8bf; 
      border-radius: 10px; padding: 20px; text-align: center; margin-top: 20px; display: none;
    }

    .display-value { font-size: 2.2rem; font-weight: 800; color: var(--dark-orange); display: block; }
    .copy-btn { color: #666; font-size: 0.85rem; cursor: pointer; text-decoration: underline; margin-top: 5px; display: inline-block; }
  </style>
</head>
<body>

  <div class="header d-flex align-items-center justify-content-center">
    <img src="https://zdifzvpjmmmsfitjsraw.supabase.co/storage/v1/object/sign/Logo/UT%20Logo.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV84MjVmNmZkNy1mZTM3LTQzNWItOWFhMi1jZGQ4ZjY5NWM0NGYiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMb2dvL1VUIExvZ28ucG5nIiwiaWF0IjoxNzc2MTYxNTMyLCJleHAiOjIwOTE1MjE1MzJ9.m1SFbDusZJ0EIqrDjog_Pok2FMzYGtVhV0hmrogL-3Q
" 
         alt="UT Logo" style="height: 55px; width: auto; margin-right: 12px; object-fit: contain;">
    <div class="text-start">
      <h4 class="m-0 fw-bold" style="letter-spacing: 0.5px;">Universal Tractor Co., Ltd.</h4>
      <small style="opacity: 0.9; font-weight: 500;">Date & Serial Converter</small>
    </div>
  </div>

  <div class="container px-3">
    <div class="main-card">
      
      <ul class="nav nav-pills nav-fill mb-4" id="convertTab" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#toDateTab" type="button">Date ➔ Serial</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="pill" data-bs-target="#toSerialTab" type="button">Serial ➔ Date</button>
        </li>
      </ul>

      <div class="tab-content">
        
        <div class="tab-pane fade show active" id="toDateTab">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">SELECT DATE</label>
            <input type="date" id="dateInput" class="form-control form-control-lg">
          </div>
          <button class="btn-convert" onclick="runDateToSerial()">CONVERT TO SERIAL</button>
          
          <div id="resDateToSerial" class="result-box">
            <small class="text-muted d-block fw-bold">EXCEL SERIAL NUMBER</small>
            <span id="outSerial" class="display-value">0</span>
            <span class="copy-btn" onclick="copyText('outSerial')">📋 Copy Result</span>
          </div>
        </div>

        <div class="tab-pane fade" id="toSerialTab">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">ENTER SERIAL NUMBER</label>
            <input type="number" id="serialInput" class="form-control form-control-lg" placeholder="e.g. 45292">
          </div>
          <button class="btn-convert" onclick="runSerialToDate()">CONVERT TO DATE</button>
          
          <div id="resSerialToDate" class="result-box">
            <small class="text-muted d-block fw-bold">CONVERTED DATE</small>
            <span id="outDate" class="display-value">-</span>
            <span class="copy-btn" onclick="copyText('outDate')">📋 Copy Result</span>
          </div>
        </div>

      </div>
    </div>
    
    <p class="text-center text-muted mt-4" style="font-size: 0.75rem;">Developed by Universal Tractor Co., Ltd.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const EXCEL_BASE = new Date(1899, 11, 30);

    function runDateToSerial() {
      const val = document.getElementById('dateInput').value;
      if(!val) return Swal.fire('Notice', 'Please select a date', 'warning');
      const date = new Date(val);
      const diff = date - EXCEL_BASE;
      const serial = Math.floor(diff / (24 * 60 * 60 * 1000));
      document.getElementById('outSerial').innerText = serial;
      document.getElementById('resDateToSerial').style.display = 'block';
    }

    function runSerialToDate() {
      const serial = parseInt(document.getElementById('serialInput').value);
      if(!serial) return Swal.fire('Notice', 'Please enter a serial number', 'warning');
      const result = new Date(EXCEL_BASE.getTime() + (serial * 24 * 60 * 60 * 1000));
      const day = String(result.getDate()).padStart(2, '0');
      const month = result.toLocaleString('en-GB', { month: 'short' });
      const year = result.getFullYear();
      document.getElementById('outDate').innerText = `${day}-${month}-${year}`;
      document.getElementById('resSerialToDate').style.display = 'block';
    }

    function copyText(id) {
      const txt = document.getElementById(id).innerText;
      navigator.clipboard.writeText(txt);
      Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copied!', showConfirmButton: false, timer: 800 });
    }

    window.onload = () => {
      // မူလ Date ကို ယနေ့ရက်စွဲ ထည့်ပေးထားခြင်း
      document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

      // Date Input Box ကို ဖျက်လိုက်လျှင် Result Box ပျောက်သွားစေရန်
      document.getElementById('dateInput').addEventListener('input', function() {
        if (!this.value) {
          document.getElementById('resDateToSerial').style.display = 'none';
        }
      });

      // Serial Input Box ကို ဖျက်လိုက်လျှင် Result Box ပျောက်သွားစေရန်
      document.getElementById('serialInput').addEventListener('input', function() {
        if (!this.value) {
          document.getElementById('resSerialToDate').style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
